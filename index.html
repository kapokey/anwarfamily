<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anwar family</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Times New Roman', Times, serif;
            line-height: 1.6;
        }

        header {
            background-color: aquamarine;
            color: blue;
            text-align: center;
            font-weight: bold;
            /* Responsive font: min 24px, preferred 5vw, max 60px */
            font-size: clamp(24px, 5vw, 60px);
            padding: 20px;
        }

        /* Container for images to ensure they don't break layout */
        .image-strip {
            background: #f0f0f0;
            overflow: hidden;
            white-space: nowrap;
            padding: 10px 0;
        }

        img {
            height: auto;
            /* Responsive image width: smaller on mobile */
            width: clamp(60px, 15vw, 120px);
            margin: 5px;
        }

        main {
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
            text-align: right;
        }

        details {
            /* Responsive font for the list */
            font-size: clamp(18px, 4vw, 40px);
            cursor: pointer;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
        }

        summary {
            font-weight: bold;
            outline: none;
            color: #333;
        }

        .family-list {
            margin-top: 15px;
            display: block;
            border-top: 2px solid aquamarine;
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <header>
        مرحباً بكم في موقع أسرة أنور عابدين عبدالله
    </header>

    <div class="image-strip">
        <marquee scrollamount="10">
            <img src="public/image/01851010.gif" alt="family icon">
            <img src="public/image/01851010.gif" alt="family icon">
            <img src="public/image/01851010.gif" alt="family icon">
            <img src="public/image/01851010.gif" alt="family icon">
            <img src="public/image/01851010.gif" alt="family icon">
            <img src="public/image/01851010.gif" alt="family icon">
            <img src="public/image/01851010.gif" alt="family icon">
        </marquee>
    </div>

    <main>
        <details open>
            <summary>تتكون الأسرة من</summary>
            <div class="family-list">
                أنور عابدين عبدالله - الأب <br>
                سعاد الطيب الجاك - الأم <br>
                محمد أنور عابدين <br>
                معتز أنور عابدين <br>
                مرتضي أنور عابدين <br>
                أيمن أنور عابدين <br>
                محاسن أنور عابدين <br>
                منيب أنور عابدين <br>
                خالد مرتضي أنور عابدين
            </div>
        </details>
    </main>

</body>
</html>
